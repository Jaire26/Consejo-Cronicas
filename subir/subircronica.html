<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agregar Crónica</title>

<link rel="stylesheet" href="../css/subir.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="upload-container">

    <a href="../admin/cronicasadmin.html" class="btn-volver-fixed">
         ← Volver
    </a>

    <div class="upload-card">

        <h1>Agregar Crónica</h1>

        <p>
            Comparte relatos, memorias y acontecimientos importantes de Huejutla.
        </p>

        <form>

            <div class="input-group">

                <label>Título de la crónica</label>

                <input type="text" placeholder="Ej. Recuerdos del Xantolo">

            </div>

            <div class="input-group">

                <label>Autor</label>

                <input type="text" placeholder="Nombre del cronista">

            </div>

            <div class="input-group">

                <label>Fecha</label>

                <input type="date">

            </div>

            <div class="input-group">

                <label>Contenido</label>

                <input type="text" placeholder="Breve resumen de la crónica">

            </div>

            <div class="input-group">

                <label>Contenido de la crónica</label>

                <textarea placeholder="Escribe aquí la crónica completa..."></textarea>

            </div>

            <div class="input-group">

                <label>Imagen principal</label>

                <input type="file">

            </div>

            <button type="submit" class="btn-upload">

                Publicar Crónica

            </button>

        </form>

    </div>
    <script src="../js/leercronica.js"></script>

</div>

</body>
</html>
