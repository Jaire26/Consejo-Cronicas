<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agregar Evento</title>

<link rel="stylesheet" href="../css/subir.css">



<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="upload-container">


    <a href="../admin/eventosadmin.html" class="btn-volver-fixed">
         ← Volver
    </a>
    <div class="upload-card">

        <h1>Subir Evento</h1>

        <p>
            Agrega nuevos eventos para que el publico se entere de todo.
        </p>

        <form>

            <div class="input-group">

                <label>Título del evento</label>

                <input type="text" placeholder="Ej. Xantolo 2026">

            </div>
            <div class="input-group">

                <label>Fecha</label>

                <input type="date">

            </div>

            <div class="input-group">

                <label>Descripcion</label>

                <textarea placeholder="Describe la fotografía..."></textarea>

            </div>
            <div class="input-group">

                <label>Ubicacion</label>

                <input type="text" placeholder="Ej. Xantolo 2026">

            </div>

            <div class="input-group">

                <label>Seleccionar imagen</label>

                <input type="file">


            </div>

            <button type="submit" class="btn-upload">
                Subir Fotografía
            </button>

        </form>

    </div>

</div>

</body>
</html>
